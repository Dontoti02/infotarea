<div class="p-lg md:p-xl flex flex-col gap-xl">
<div class="flex flex-col items-center text-center gap-sm">

<span class="material-symbols-outlined text-on-primary" style="font-size: 28px; font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Recuperar Contraseña</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
                    Ingresa tu correo institucional para recibir un enlace de recuperación.
                </p>
</div>
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="w-full pl-[40px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="email" name="email" placeholder="ejemplo@institucion.edu" required="" type="email"/>
</div>
</div>
<button class="w-full flex items-center justify-center gap-sm bg-primary-container text-white font-label-md text-label-md rounded-lg py-sm px-lg transition-colors hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary active:scale-[0.98]" type="submit">
<span>Enviar enlace</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="pt-sm border-t border-outline-variant/50 flex justify-center">
<a class="inline-flex items-center gap-xs font-label-md text-label-md text-primary hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span>Volver al inicio de sesión</span>
</a>
</div>
</div>

<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">school</span>
