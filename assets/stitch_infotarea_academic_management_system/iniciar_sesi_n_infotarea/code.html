<body class="bg-surface min-h-screen flex flex-col font-body-md text-on-surface">
<main class="flex-grow flex items-center justify-center p-md md:p-xl">

<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">InfoTarea</h1>

</div>
<form class="space-y-lg">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-xl">mail</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm font-body-md text-body-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder:text-outline-variant" id="email" placeholder="usuario@institucion.edu" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-xl">lock</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm font-body-md text-body-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded text-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-sm block font-body-md text-body-md text-on-surface-variant" for="remember-me">

                        </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">

                        </a>
</div>
</div>
<div>
